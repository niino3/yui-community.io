services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: yui-app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yui-network

  nginx:
    image: nginx:1.25-alpine
    container_name: yui-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - yui-network

  db:
    image: postgres:16-alpine
    container_name: yui-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yui
      POSTGRES_USER: yui
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - yui-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yui"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yui-network

  redis:
    image: redis:7-alpine
    container_name: yui-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - yui-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yui-network

volumes:
  yui-db-data:
  yui-redis-data:

networks:
  yui-network:
    driver: bridge
